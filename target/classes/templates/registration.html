<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <a class="navbar-brand" th:href="@{/}">TPO System</a>
</nav>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">TPO Registration</div>
                <div class="card-body">
                    <form th:action="@{/registration}" th:object="${user}" method="post">
                        <div class="text-danger mb-3" th:if="${registerError}" th:text="${registerError}"></div>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" th:field="*{fullName}" class="form-control" placeholder="Enter full name" required />
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="Enter email" required />
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" th:field="*{phone}" class="form-control" placeholder="Enter phone" />
                        </div>
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" th:field="*{userName}" class="form-control" placeholder="Enter username" required />
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="Enter password" required />
                        </div>
                        <button type="submit" class="btn btn-primary">Register</button>
                    </form>
                    <div class="mt-3">
                        <p>Already have an account? <a th:href="@{/login}">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
