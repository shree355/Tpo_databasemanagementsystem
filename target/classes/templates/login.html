<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <a class="navbar-brand" th:href="@{/}">TPO System</a>
</nav>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Login</div>
                <div class="card-body">
                    <form th:action="@{/login}" th:object="${loginUser}" method="post">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" th:field="*{userName}" class="form-control" placeholder="Enter username" required />
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="Enter password" required />
                        </div>
                        <div class="text-success" th:if="${registerSuccess}" th:text="${registerSuccess}"></div>
                        <div class="text-danger" th:if="${loginError}" th:text="${loginError}"></div>
                        <button type="submit" class="btn btn-success">Login</button>
                    </form>
                    <div class="mt-3">
                        <p>New user? <a th:href="@{/registration}">Create account</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
