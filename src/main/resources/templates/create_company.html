ï»¿<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Create Company</title>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-md bg-dark navbar-dark">
  <a class="navbar-brand" href="#">Dashboard</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="collapsibleNavbar">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Companies</a></li>
    </ul>
  </div>
</nav>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card">
        <div class="card-header text-center"><h2>Create Company</h2></div>
        <div class="card-body">
          <form th:action="@{/dashboard}" th:object="${company}" method="post">
            <div class="form-group">
              <label>Company Name</label>
              <input type="text" th:field="*{companyName}" class="form-control" placeholder="Enter company name" />
            </div>
            <div class="form-group">
              <label>HR Name</label>
              <input type="text" th:field="*{hrName}" class="form-control" placeholder="Enter HR name" />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" th:field="*{email}" class="form-control" placeholder="Enter email" />
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="text" th:field="*{phone}" class="form-control" placeholder="Enter phone" />
            </div>
            <div class="form-group">
              <label>Website</label>
              <input type="text" th:field="*{website}" class="form-control" placeholder="Enter website" />
            </div>
            <div class="form-group">
              <label>Address</label>
              <input type="text" th:field="*{address}" class="form-control" placeholder="Enter address" />
            </div>
            <div class="form-group">
              <label>City</label>
              <input type="text" th:field="*{city}" class="form-control" placeholder="Enter city" />
            </div>
            <div class="form-group">
              <label>State</label>
              <input type="text" th:field="*{state}" class="form-control" placeholder="Enter state" />
            </div>
            <div class="form-group">
              <label>Status</label>
              <input type="text" th:field="*{status}" class="form-control" placeholder="Enter status" />
            </div>
            <button type="submit" class="btn btn-primary">Save Company</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
